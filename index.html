<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #f0f0f0; text-align: center; font-family: sans-serif; padding-top: 50px; }
        button { background: #248bed; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 18px; }

</head>
<body>
    <h1>Привет! Это мое приложение</h1>
    <button onclick="tg.close()">Закрыть приложение</button>

        tg.expand(); // Развернуть на весь экран
    </script>
</body>
</html>
